name: Publish to NuGet

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Pack
        run: |
          dotnet pack src/DotnetMcp.Core         --no-build --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts
          dotnet pack src/DotnetMcp.Host         --no-build --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts
          dotnet pack plugins/dotnet-test/src/DotnetMcp.Testing --no-build --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts
          dotnet pack plugins/dotnet-build/src/DotnetMcp.Build  --no-build --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
